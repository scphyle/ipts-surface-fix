PACKAGE_NAME="ipts"
PACKAGE_VERSION="1.0"
BUILT_MODULE_NAME[0]="ipts"
DEST_MODULE_LOCATION[0]="/kernel/drivers/hid"
AUTOINSTALL="yes"
MAKE="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build obj-m=ipts.o ipts-objs='cmd.o control.o eds1.o eds2.o hid.o main.o mei.o receiver.o resources.o thread.o'"
CLEAN="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
